# CI — runs on every PR + push to main
#
# Guards:
#   1. typecheck across the whole workspace (persona-schema, sdk, cli, desktop,
#      cloud-sdk, cloud-runtime, browser-pod) via `pnpm -r typecheck`
#   2. unit tests for every package with a vitest surface (persona-schema, sdk,
#      cli, desktop, cloud-sdk, cloud-runtime, browser-pod)
#   3. captured-WebGL-profiles drift check — bench/captured-profiles/*.json
#      must stay in lock-step with src/injection/webgl-profiles-captured.ts
#      (Phase 7.0 contributor pipeline). Re-run
#      `pnpm --filter @runova/sdk run bench:integrate-profiles` locally and
#      commit the regenerated TS to fix a drift failure.
#   4. biome lint on CHANGED files (separate `lint` job, PR-only, NON-BLOCKING) —
#      see below.
#
# Biome lint: the `lint` job runs `biome ci --changed` against the PR base and
# emits inline annotations so new / AI-generated lint debt is visible on every
# PR. It is currently NON-BLOCKING (continue-on-error) because `--changed` lints
# whole changed files and the repo still has ~500 legacy findings — touching a
# legacy file would otherwise false-fail on pre-existing issues. Flip to blocking
# after the full-repo cleanup (tracked in DEVELOPMENT.md "Known follow-ups").
#
# We run on ubuntu-latest. Mosaiq desktop runs on Windows, but the test
# surface (pure functions, vitest) is platform-agnostic. Windows-specific
# behavior is exercised manually.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress CI for the same PR / branch when a new commit lands —
# saves runner minutes during rapid iteration.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lightweight guardrail against the "silent disable" class of CI bugs:
  # a workflow file that fails to parse as YAML is silently dropped by
  # GitHub Actions -- no email, no failed check, no badge red, the
  # workflow just stops appearing in the runs list. A regression-test
  # workflow that doesn't run is functionally worse than no workflow at
  # all because everyone assumes coverage exists.
  #
  # Historical precedent: commit a5f4499 (phase 11.2 prod-hardening CI
  # gate) corrupted .github/workflows/cloud-runtime-e2e.yml via an
  # edit-tool footgun on GitHub Actions templating syntax. The broken
  # workflow shipped to main and silently stopped running for ~10 min
  # before discovery. This job catches that class of bug in <5s on every
  # PR before merge.
  #
  # actionlint catches more (unknown action versions, expression-syntax
  # errors) and could be added later; yaml.safe_load is the minimum
  # viable gate against silent-disable specifically.
  workflow-yaml-lint:
    name: workflow YAML lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Python + PyYAML ship on ubuntu-latest runners by default; no
      # apt-get / pip needed. If a future runner image drops PyYAML we
      # can pin `pip install pyyaml` here.
      - name: Validate all .github/workflows/*.yml parse
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob, sys, yaml
          files = sorted(glob.glob('.github/workflows/*.yml'))
          if not files:
              sys.exit('no workflow files found -- working dir wrong?')
          print(f'validating {len(files)} workflow file(s)')
          failed = []
          for f in files:
              try:
                  with open(f, encoding='utf-8') as fh:
                      yaml.safe_load(fh)
                  print(f'  OK   {f}')
              except Exception as e:
                  print(f'  FAIL {f}: {e}')
                  failed.append(f)
          if failed:
              sys.exit(f'\n{len(failed)} workflow file(s) failed YAML parse: {failed}')
          PY

  # Biome lint VISIBILITY gate on CHANGED files (PR-only, NON-BLOCKING for now).
  #
  # `biome ci --changed` lints whole changed files (not just diff hunks). The
  # repo still carries ~500 legacy findings, many in large files like the 2k-line
  # injection runner — so the moment a PR legitimately edits one of those files a
  # HARD gate would false-fail on pre-existing issues nobody touched. To avoid
  # that footgun we run this as `continue-on-error` and emit GitHub annotations:
  # reviewers see new lint issues inline on changed files, but the check never
  # blocks merge. Flip to blocking (drop continue-on-error) after the full-repo
  # legacy cleanup tracked in DEVELOPMENT.md "Known follow-ups". PR-only because
  # `--changed` needs a base ref to diff against.
  lint:
    name: biome lint (changed files, non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    # Non-blocking: surfaces lint debt without false-failing on legacy files.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so `--since=<base sha>` can resolve the diff base.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # biome.json has vcs.enabled=true, so `--changed --since=<ref>` scopes to
      # files that differ from the PR base. --reporter=github emits inline PR
      # annotations. Docs-only PR (no lintable changes) = clean.
      - name: Biome lint changed files
        run: pnpm exec biome ci --changed --since=${{ github.event.pull_request.base.sha }} --reporter=github .

  test:
    name: typecheck + test + drift check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm must be installed BEFORE setup-node so the node cache key picks
      # up the correct package manager hash. Version pinned to match
      # `packageManager` in root package.json.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Desktop + CLI typecheck imports workspace packages through their
      # built dist `.d.ts` files (per DEVELOPMENT.md). Build the upstream
      # packages first so the resolution succeeds.
      #
      # We build ALL publishable packages here (not just persona-schema +
      # sdk) for two reasons:
      #   1. The audit-tarballs step at the bottom runs `npm pack --dry-run`
      #      against persona-schema / sdk / cli and asserts REQUIRED dist
      #      files (e.g. cli's dist/cli.js) are present. Before commit
      #      6cae6a9 each package's prepublishOnly hook would clean+build
      #      itself when npm pack ran; that hook was removed to fix a
      #      monorepo parallel-publish race in changesets, so dist must
      #      exist BEFORE audit-tarballs runs.
      #   2. cloud-sdk is added to the typecheck graph in phase 11.1 and
      #      will join the audit list in a future PR; building it now
      #      keeps the build sequence consistent with release.yml.
      # Total cost: <30s, all packages build in topological order.
      - name: Build workspace packages
        run: |
          pnpm --filter "@runova/persona-schema" \
               --filter "@runova/sdk" \
               --filter "@runova/cloud-sdk" \
               --filter "@runova/cli" \
               build

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      - name: Test — persona-schema
        run: pnpm --filter @runova/persona-schema test

      - name: Test — sdk
        run: pnpm --filter @runova/sdk test

      # CLI vitest covers pure helpers under packages/cli/src/commands/**
      # (selectPersonas / aggregateBatch / decideBatchExitCode / template-
      # tag parsing / proxy-url shaping). Does not spawn Chromium.
      - name: Test — cli
        run: pnpm --filter @runova/cli test

      # Desktop vitest covers pure renderer helpers (artifact-url) and the
      # main-process artifact protocol core (path resolution, MIME). No
      # Electron runtime is started — these are happy-dom / Node tests.
      - name: Test — desktop
        run: pnpm --filter @mosaiq/desktop test

      # v0.11 phase 11.1+ cloud surface unit tests:
      #
      #   cloud-sdk     12 tests — client.ts (REST), session.ts (CDP proxy +
      #                 injection survival across reconnect), injection-survives-cdp
      #   cloud-runtime 63 tests — env / db / persona / sessions / health routes,
      #                 static / fly / local-docker machine managers
      #                 (mocked Fly + Docker Engine APIs), pod-control wire helpers
      #   browser-pod   6 tests — env / persona-flags / relay / crypto / context-io
      #                 / app route smoke. Pure logic + mocked child_process; no
      #                 real chromium spawned (the real-browser path is covered by
      #                 cloud-runtime-e2e.yml). Now run as a first-class gate.
      - name: Test — cloud-sdk
        run: pnpm --filter @runova/cloud-sdk test

      - name: Test — cloud-runtime
        run: pnpm --filter @mosaiq/cloud-runtime test

      - name: Test — browser-pod
        run: pnpm --filter @mosaiq/browser-pod test

      # Phase 7.0 drift detection: regenerate the captured-profiles TS in
      # `--check` mode and fail if the on-disk file differs. This is the
      # exact contract documented in docs/CAPTURING-WEBGL-PROFILES.md.
      - name: Drift check — captured WebGL profiles
        run: pnpm --filter @runova/sdk run bench:integrate-profiles -- --check

      # v0.10 phase 10.2 drift detection: the rebrowser-patches patch for
      # playwright-core@1.59.1 is duplicated between the workspace root
      # (`patches/`, consumed by pnpm.patchedDependencies for monorepo install)
      # and `packages/sdk/patches/` (shipped in the npm tarball + applied by
      # @runova/sdk's postinstall for external consumers). These two MUST stay
      # byte-identical; this step fails if they drift.
      - name: Drift check — @runova/sdk playwright-core patch
        run: pnpm run check-sdk-patch-drift

      # v0.10 phase 10.6 drift detection: the Detection Lab CI gate
      # (.github/workflows/detection-lab.yml, phase 10.7) seeds
      # tests/fixtures/personas/*.json into ~/.mosaiq/personas/ before running
      # `mosaiq detection-lab run-all`. Those JSON files are generated
      # deterministically from persona-schema template factories by
      # `scripts/build-fixture-personas.ts`. If the script or the template
      # factories evolve and the on-disk fixture is not regenerated, the
      # baseline-runs / candidate-runs comparison would drift for reasons
      # unrelated to anti-detection behavior. This step fails if the committed
      # JSON diverges from what the current generator would emit; re-run
      # `pnpm build-fixture-personas` locally and commit the regenerated JSON.
      - name: Drift check — Detection Lab fixture personas
        run: pnpm build-fixture-personas --check

      # v0.10 phase 10.8 unit tests: the refresh-baseline.mts script
      # (.github/workflows/refresh-baseline.yml driver) does a multi-run
      # consensus across 3 Detection Lab runs to suppress transient
      # network / detector flakes from polluting the committed baseline.
      # The consensus algorithm is pure logic — exercising it inside
      # refresh-baseline.yml would require a 60-min Chromium run that
      # only catches regressions retrospectively. Instead we run a
      # synthetic-fixtures test suite here on every PR to catch
      # consensus-vote / severity-tie-break / structural-mismatch
      # regressions before they reach the cron.
      - name: Test — refresh-baseline consensus
        run: pnpm test:refresh-baseline

      # v0.10 phase 10.3 publish gate: assert each publishable package's npm
      # tarball contains exactly the expected files (REQUIRED present, no
      # FORBIDDEN leaks like bench/ / src/ / chromium-fork / captured-profiles).
      # Guards against accidentally publishing 27 GB chromium-fork artifacts
      # or multi-MB captured-profiles JSON.
      - name: Audit publishable tarballs
        run: pnpm run audit-tarballs
