# Release — auto-version + publish via changesets
#
# CURRENTLY MANUAL-ONLY (workflow_dispatch). Re-enable push:main trigger
# when ALL of the following are true:
#   1. The `@mosaiq` npm org exists and the actor running this workflow has
#      publish rights to every package below.
#   2. EITHER `NPM_TOKEN` secret is set in repo settings (`automation`
#      granular token, scoped to @mosaiq) OR each package has trusted
#      publishing configured on npmjs.com pointing at this exact workflow.
#   3. The first publish (0.10.0 / 0.11.0) has been done from a maintainer's
#      shell with NPM_TOKEN — see docs/V0.10-NPM-DISTRIBUTION-AND-CI-GATE.md §8.
#      Trusted publishing requires the package to already exist; it cannot
#      bootstrap the very first version.
#
# Why this is locked down right now (phase 11.x):
#   - npm scope `@mosaiq` is unregistered → every PUT returns E404.
#   - phase 11.x is internal dev iteration, not a release cadence; we don't
#     want every push to main to attempt a publish.
#   - Re-enable by uncommenting the `push:` block below.
#
# Behavior (when active):
#   - If `.changeset/*.md` files are present on main, opens a
#     `chore(release): version packages` PR that bumps versions in the
#     lock-step `fixed` group and removes the consumed changeset files.
#   - When the release PR merges (and no pending changesets remain), runs
#     `pnpm changeset publish` — publishes the four publishable packages
#     (@runova/persona-schema + @runova/sdk + @mosaiq/cli + @runova/cloud-sdk)
#     to npm with provenance attestation.

name: Release

on:
  workflow_dispatch:
  # Locked: re-enable after first manual 0.10.0/0.11.0 publish + NPM_TOKEN.
  # push:
  #   branches: [main]

# Don't run two release jobs in parallel — npm publish ordering must be
# sequential to avoid version conflicts.
concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    name: changesets / publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      pull-requests: write
      id-token: write # required for npm provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # changesets needs full history to detect already-published versions
          # and to write the release PR commit.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build all four publishable packages BEFORE running changesets publish.
      #
      # We do NOT rely on prepublishOnly inside each package anymore — that
      # hook used to `clean && build && typecheck`, which created a race in
      # changesets's parallel `npm publish`: persona-schema's `clean` would
      # delete its dist while sdk's tsc was concurrently reading
      # @runova/persona-schema/dist/*.d.ts, producing TS2307 storms. CI
      # already enforces typecheck+test+build on every PR, so this single
      # up-front build is sufficient gate.
      #
      # Order matters: persona-schema is a dep of sdk + cloud-sdk + cli;
      # pnpm respects topological order within --filter, so this single
      # invocation builds them in the right sequence.
      - name: Build publishable packages
        run: |
          pnpm --filter "@runova/persona-schema" \
               --filter "@runova/sdk" \
               --filter "@runova/cloud-sdk" \
               --filter "@mosaiq/cli" \
               build

      # Defense-in-depth: even the release path must pass the same audit
      # gates as CI. This catches "version PR somehow shipped a broken
      # tarball" regressions before npm sees them.
      - name: Drift check — @runova/sdk playwright-core patch
        run: pnpm run check-sdk-patch-drift

      - name: Audit publishable tarballs
        run: pnpm run audit-tarballs

      # changesets/action does two things:
      #   - If pending `.changeset/*.md` files exist on main, opens / updates
      #     the release PR (no publish happens).
      #   - If no pending changesets exist (i.e., the release PR has just
      #     merged), runs `publish` to push to npm.
      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Tell npm to attach an OIDC provenance attestation. Shows up as a
          # "verified provenance" badge on the package's npmjs.com page.
          NPM_CONFIG_PROVENANCE: 'true'
