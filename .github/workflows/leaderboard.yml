# Mosaiq public site + Detection Lab Leaderboard publish.
#
# The landing page lives at _site/index.html. The leaderboard generator reads
# committed baseline runs under tests/fixtures/baseline-runs/ and writes only
# _site/leaderboard/index.html so it cannot overwrite the landing page.
#
# Trigger policy:
#   - pull_request: build-only validation; never deploys.
#   - push:main: build + deploy to GitHub Pages.
#   - workflow_dispatch: manual rebuild/redeploy handle.
#
# Deploying requires GitHub Pages to be enabled for the repo:
# Settings -> Pages -> Source: GitHub Actions.

name: Public Site

on:
  pull_request:
    branches: [main]
    paths:
      - '_site/**'
      - 'docs/SITE-BRAND-HANDOFF.md'
      - 'packages/sdk/src/detection-lab/leaderboard.ts'
      - 'scripts/build-leaderboard.mts'
      - 'tests/fixtures/baseline-runs/**'
      - '.github/workflows/leaderboard.yml'
  push:
    branches: [main]
    paths:
      - '_site/**'
      - 'docs/SITE-BRAND-HANDOFF.md'
      - 'packages/sdk/src/detection-lab/leaderboard.ts'
      - 'scripts/build-leaderboard.mts'
      - 'tests/fixtures/baseline-runs/**'
      - '.github/workflows/leaderboard.yml'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build public site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build leaderboard
        run: pnpm build-leaderboard --out ./_site/leaderboard

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    name: deploy to Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
