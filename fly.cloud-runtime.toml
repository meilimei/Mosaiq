# fly.cloud-runtime.toml — Mosaiq Cloud control plane (phase 11.2 prod path)
#
# Topology role:
#   Long-lived Hono HTTP + WebSocket server on :8787. Reads / writes one sqlite
#   DB on a Fly Volume. Acts as:
#     - REST control plane for /v1/sessions, /v1/personas, /v1/health
#     - WebSocket CDP proxy: ws://.../v1/sessions/:id forwards to pod 6PN [ipv6]:9223
#     - Machines API client: drives mosaiq-browser-pod app
#
# Single-region (iad) for v0.12; multi-region read-replicas tracked for later.
#
# Deploy usage:
#   # First-time setup:
#   flyctl apps create mosaiq-cloud-runtime --org <your-org>
#
#   # Create the sqlite volume (1 GB is generous for v0.12 — sqlite is the
#   # control-plane DB only, all chromium / session state lives per-machine).
#   flyctl volumes create cloud_runtime_data \
#     --app mosaiq-cloud-runtime --region iad --size 1
#
#   # Set secrets. FLY_API_TOKEN must have access to the browser-pod app's
#   # Machines API (org-scoped deploy token is the simplest). SEED_API_KEY must
#   # be left UNSET in prod — bootstrap a real key after first deploy with:
#   #   flyctl ssh console -a mosaiq-cloud-runtime \
#   #     -C 'node dist/admin/create-api-key.js proj_launchai'
#   flyctl secrets set \
#     FLY_API_TOKEN=$(cat ~/.fly-machines-token) \
#     FLY_POD_APP_NAME=mosaiq-browser-pod \
#     METRICS_TOKEN=$(openssl rand -hex 32) \
#     --app mosaiq-cloud-runtime
#
#   # ⚠️  WHY FLY_POD_APP_NAME (not FLY_APP_NAME): Fly 的 machine runtime 会自动
#   # 注入 FLY_APP_NAME=<当前-app-name> 到每个 machine，覆盖 secrets 里同名
#   # 的值。史话里踩过坑：如果这边叫FLY_APP_NAME=mosaiq-browser-pod，运行
#   # 时 FlyMachineManager 看到的是 mosaiq-cloud-runtime，POST /apps/...走错 app
#   # → Fly Machines API 返 403 unauthorized。同理 FLY_REGION 也 reserved，下面
#   # [env] 里叫 FLY_POD_REGION。
#
#   # Deploy.
#   flyctl deploy --config fly.cloud-runtime.toml \
#                 --dockerfile apps/cloud-runtime/Dockerfile
#
#   # After it goes green:
#   curl https://mosaiq-cloud-runtime.fly.dev/v1/health
#   curl -H "Authorization: Bearer $METRICS_TOKEN" \
#        https://mosaiq-cloud-runtime.fly.dev/v1/metrics | head -40
#   # Then bootstrap a prod API key (see docs/PHASE-11.2-FLY-DEPLOY.md §6).

app = "mosaiq-cloud-runtime"
primary_region = "iad"

[build]
  dockerfile = "apps/cloud-runtime/Dockerfile"

[env]
  # ─── runtime ─────────────────────────────────────────────────────────────
  NODE_ENV = "production"
  PORT = "8787"
  HOST = "0.0.0.0"
  LOG_LEVEL = "info"

  # ─── DB: sqlite on the mounted volume ────────────────────────────────────
  DATABASE_URL = "sqlite:/data/cloud-runtime.db"

  # ─── machine manager: fly per-session microVMs ───────────────────────
  MACHINE_MANAGER = "fly"
  # Points at the OTHER app — the browser-pod template. FlyMachineManager calls
  # POST /v1/apps/$FLY_POD_APP_NAME/machines against this.
  # (FLY_POD_APP_NAME comes from `flyctl secrets set` — see header. We CAN'T use
  # the obvious name FLY_APP_NAME because Fly auto-injects that with the
  # current app's name and shadows our secret — manager would 403.)
  FLY_POD_REGION = "iad"
  # registry.fly.io is automatically resolvable from Fly Machines without auth
  # so long as FLY_API_TOKEN has access to the source app.
  FLY_BROWSER_POD_IMAGE = "registry.fly.io/mosaiq-browser-pod:latest"
  FLY_MAX_MACHINES = "10"
  FLY_MACHINE_CPUS = "2"
  FLY_MACHINE_MEMORY_MB = "2048"
  FLY_POD_CONTROL_PORT = "9222"

  # ─── Phase 11.3a stopped-machine pool ────────────────────────────────────
  # POOL_TARGET_SIZE 控制是否启用 pool（0 = 关，phase 11.2 cold-only 行为）。
  #
  # 上线策略（4 步剧本见 docs/PHASE-11.3-MACHINE-POOL.md §7.1）：
  #   1. 先 deploy POOL_TARGET_SIZE=0 验证 phase 11.2 仍然绿灯（零回归）。
  #   2. `flyctl secrets set POOL_TARGET_SIZE=1`：观察 24h（secret 优先于
  #      [env]，不需要 redeploy）。
  #   3. 命中率 ≥ 80% → secrets set POOL_TARGET_SIZE=3，稳态 72h。
  #   4. 仅在 > 100 sessions/day 时才考虑 5。
  #
  # 观测：`scripts/prod-pool-snapshot.ps1` 每阶段抓 1h / 6h / 24h 快照，
  # 解析 5 个 pool counter + acquire histogram，本地 diff 算 hit rate +
  # P50/P95（详见 §7.0）。**不**要求 Prometheus / Grafana 在位。
  #
  # 紧急回滚：`flyctl secrets set POOL_TARGET_SIZE=0 --app mosaiq-cloud-runtime`
  # 自动重启 + pool 立即关闭，acquire 100% 回到 cold path。
  # （未消耗的 pool entry 会在 cloud-runtime shutdown 时被 destroy；下次启动
  # bootstrap 也会扫描并 evict 任何剩余的 mosaiq_pool=true machine。）
  # 红线见 §7.2 — acquire >60s / prov_fail >20% / consume_failed 持续涨。
  POOL_TARGET_SIZE = "0"
  POOL_REPLENISH_INTERVAL_MS = "10000"
  POOL_REPLENISH_CONCURRENCY = "2"
  # 24h 后强制 evict，避免 pool entry 持续累积陈旧镜像 / Fly host 漂移问题。
  POOL_MAX_AGE_SECONDS = "86400"
  POOL_PROVISION_TIMEOUT_MS = "120000"
  # bootstrap 时扫到非 pool-marked 的 stopped machine 也销毁——避免账单泄漏。
  # 第一次启用 pool 时若担心误杀，可先设 "false" 观察 24h 再打开。
  POOL_BOOTSTRAP_EVICT_FOREIGN = "true"

  # ─── project + API key seeding ───────────────────────────────────────────
  # SEED_API_KEY is deliberately NOT set here (env.ts forbids it under
  # NODE_ENV=production). Bootstrap via admin CLI after first deploy.
  SEED_PROJECT_ID = "proj_launchai"

  # ─── session policy ──────────────────────────────────────────────────────
  SESSION_TTL_DEFAULT_SECONDS = "1800"
  SESSION_TTL_MAX_SECONDS = "7200"
  # Reaper 周期：每 30s 扫一次 sessions 表，把 expires_at 过期但 status='live'
  # 的强制 release（防 client crash / 忘 close 导致 pool 泄漏）。30s/1800s ≈
  # 1.7% 资源 over-allocation 上限，对 Fly machine 计费可接受。详见
  # apps/cloud-runtime/src/jobs/session-expiry.ts。
  SESSION_EXPIRY_INTERVAL_MS = "30000"

  # ─── rate limit (per api_key_id token bucket) ────────────────────────────
  # 默认值同 env.ts，这里显式写出便于 ops 调整（改完 `flyctl deploy` 或
  # `flyctl secrets set` 然后重启即可生效）：
  #   strict (createSession) :  10 burst,  1 RPS  ≈ 60/min   (重路径)
  #   write  (DELETE/POST persona): 30 burst, 5 RPS  ≈ 300/min
  #   read   (GET)            : 100 burst, 16 RPS ≈ 1000/min
  RATE_LIMIT_STRICT_CAPACITY = "10"
  RATE_LIMIT_STRICT_REFILL_PER_SEC = "1"
  RATE_LIMIT_WRITE_CAPACITY = "30"
  RATE_LIMIT_WRITE_REFILL_PER_SEC = "5"
  RATE_LIMIT_READ_CAPACITY = "100"
  RATE_LIMIT_READ_REFILL_PER_SEC = "16"

  # ─── metrics ─────────────────────────────────────────────────────────────
  # METRICS_TOKEN 不在这里（secret，必须 flyctl secrets set）。
  # 留空 → /v1/metrics 返 404；prod 必须设置。

  # ─── public URL (used for cdp_public_url in createSession response) ──────
  PUBLIC_BASE_URL = "https://mosaiq-cloud-runtime.fly.dev"

# ─── sqlite volume ──────────────────────────────────────────────────────────
# `flyctl volumes create cloud_runtime_data --region iad --size 1` first.
# Volume is bound to a single machine; scaling to >1 machine requires
# multi-region replication strategy (deferred to phase 11.4).
[[mounts]]
  source = "cloud_runtime_data"
  destination = "/data"

# ─── public HTTPS service ───────────────────────────────────────────────────
# Fly proxy terminates TLS at fly-edge and forwards HTTP + WS upgrade requests
# to internal_port. Force HTTPS to avoid mixed-content + insecure CDP tokens.
[http_service]
  internal_port = 8787
  force_https = true
  # Control plane MUST stay up — no autoscale-to-zero.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/v1/health"

# Single machine sizing — small box is fine for control plane (it's
# I/O bound on sqlite + Fly Machines API calls, not CPU bound).
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"

# Restart on crash; cap retries to avoid hammering on a bad sqlite state.
[[restart]]
  policy = "on-failure"
  retries = 5
